kind = "web"
previewPath = "/"
title = "灯塔计划 Lighthouse Plan"
version = "1.0.0"
id = "artifacts/lighthouse-plan"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23140

[services.development]
run = "pnpm --filter @workspace/lighthouse-plan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lighthouse-plan", "run", "build" ]
serve = "static"
publicDir = "artifacts/lighthouse-plan/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23140"
BASE_PATH = "/"
